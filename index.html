<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信扫码</title>
<style>
*{margin:0;padding:0}
body{background:#f7f7f7;display:flex;flex-direction:column;align-items:center;padding:50px 20px;font-family:system-ui}
.wrap{background:#fff;padding:30px;border-radius:14px;text-align:center;max-width:320px}
h2{font-size:18px;color:#222;margin-bottom:20px}
img{width:260px;border-radius:6px;margin-bottom:16px}
.tips{color:#666;font-size:14px;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
<h2>微信扫码添加</h2>
<!-- 这里图片名和你上传的二维码文件名保持一致 -->
<img src="wx.jpg" alt="微信二维码">
<p class="tips">长按保存图片<br>打开微信扫一扫相册图片</p>
</div>
</body>
</html>
